  /internal/suppliers:
    get:
      tags: [internal, suppliers]
      summary: 获取供应商列表
      description: |
        获取可用的供应商信息列表。
        可用于配件比价时的供应商筛选。
        仅供FixCycle前端内部调用。
      security:
        - InternalAuth: []
      parameters:
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: category
          in: query
          description: 供应商品类筛选
          required: false
          schema:
