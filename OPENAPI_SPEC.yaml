                          name: 'iPhone 15 Pro 屏幕总成'
                          model: 'A2842-屏幕'
                          device_id: '1'
                          device_name: 'iPhone 15 Pro'
                          category: '屏幕'
                          brand: 'Apple'
                          compatible_models: ['A2842', 'A2843']
                          price_range:
                            min: 899.00
                            max: 1299.00
                            avg: 1099.00
                          suppliers_count: 12
                          image_url: 'https://example.com/screen.jpg'
                        - id: 'P002'
                          name: 'iPhone 15 Pro 电池'
                          model: 'A2842-电池'
                          device_id: '1'
                          device_name: 'iPhone 15 Pro'
                          category: '电池'
                          brand: 'Apple/OEM'
                          compatible_models: ['A2842']
                          price_range:
                            min: 299.00
                            max: 499.00
                            avg: 399.00
                          suppliers_count: 8
                          image_url: 'https://example.com/battery.jpg'
                      pagination:
                        page: 1
                        limit: 20
                        total: 45
                        total_pages: 3
                      search_metadata:
                        keyword: 'iPhone 15'
                        filters_applied: ['device_id']
                        search_time_ms: 45
                    message: 'success'
        '400':
          description: 搜索参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/parts/{id}/price:
    get:
      tags: [internal, parts]
      summary: 获取配件最新报价
      description: |
        获取指定配件的最新市场价格信息。
        包含多个供应商的报价和历史价格趋势。
        仅供FixCycle前端内部调用。
      security:
        - InternalAuth: []
      parameters:
        - name: id
          in: path
          description: 配件ID
          required: true
          schema:
            type: string
        - name: supplier_limit
          in: query
          description: 返回供应商报价数量限制
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: 成功获取价格信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
