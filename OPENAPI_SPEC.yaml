openapi: 3.0.3
info:
  title: FixCycle API 规范
  description: |
    FixCycle 3C电子产品维修服务平台API接口文档

    ## 系统架构说明
    - **公开API**：面向第三方开发者和合作伙伴开放 ⏳ 规划中
    - **内部API**：仅供FixCycle前端内部调用，需服务端认证 ✅ 已实现
    - **管理API**：后台管理系统专用接口 ✅ 已实现

    ## 认证机制
    - 公开API：API Key认证 ⏳ 规划中
    - 内部API：JWT Token + 服务端验证 ✅ 已实现
    - 管理API：RBAC权限控制 ✅ 已实现

    ## 响应格式规范
    所有接口统一返回格式：
    ```json
    {
      "code": 200,
      "data": {},
      "message": "success"
    }
    ```
  version: 1.1.0
  contact:
    name: FixCycle开发团队
    email: dev@fixcycle.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.fixcycle.com/v1
    description: 生产环境 ✅ 已部署
  - url: https://staging-api.fixcycle.com/v1
    description: 预发布环境 ⏳ 待配置
  - url: http://localhost:3001/api
    description: 本地开发环境 ✅ 可用

tags:
  - name: public
    description: 公开API接口 ⏳ 规划中
  - name: internal
    description: 内部API接口（需服务端认证）✅ 已实现
  - name: admin
    description: 管理后台API接口 ✅ 已实现
  - name: devices
    description: 设备相关接口 ✅ 已实现
  - name: parts
    description: 配件相关接口 ✅ 已实现
  - name: suppliers
    description: 供应商相关接口 ✅ 已实现
  - name: reviews
    description: 文档审核接口 ✅ 已实现
  - name: tokens
    description: Token经济系统接口 ✅ 已实现
  - name: diagnosis
    description: AI诊断接口 ✅ 已实现

paths:
  # ==================== 设备生命周期管理API ====================

  /api/devices/{qrcodeId}/profile:
    post:
      tags: [devices, lifecycle]
      summary: 获取或创建设备档案
      description: |
        根据二维码ID获取设备档案信息，如果不存在则创建新的设备档案。
        支持传入设备详细信息进行档案初始化或更新。
      parameters:
        - name: qrcodeId
          in: path
          description: 设备二维码ID
          required: true
          schema:
            type: string
            example: 'test_device_001'
      requestBody:
        description: 设备档案信息（可选）
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                productModel:
                  type: string
                  description: 产品型号
                  example: 'iPhone 15 Pro'
                productCategory:
                  type: string
                  description: 产品类别
                  example: '智能手机'
                brandName:
                  type: string
                  description: 品牌名称
                  example: 'Apple'
                serialNumber:
                  type: string
                  description: 序列号
                  example: 'SN_IP15P_001'
                manufacturingDate:
                  type: string
                  format: date
                  description: 生产日期
                  example: '2026-01-15'
                warrantyPeriod:
                  type: integer
                  description: 保修期（月）
                  example: 12
                currentStatus:
                  type: string
                  description: 当前状态
                  enum:
                    [
                      manufactured,
                      activated,
                      in_use,
                      maintained,
                      transferred,
                      recycled,
                      scrapped,
                    ]
                  example: 'activated'
                currentLocation:
                  type: string
                  description: 当前位置
                  example: '北京市朝阳区'
                ownerInfo:
                  type: object
                  description: 所有者信息
                  properties:
                    name:
                      type: string
                      example: '张三'
                    department:
                      type: string
                      example: 'IT部门'
                specifications:
                  type: object
                  description: 技术规格
                  example: { 'storage': '256GB', 'color': '钛金属原色' }
      responses:
        '200':
          description: 成功获取或创建设备档案
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: '设备档案获取成功'
                  data:
                    $ref: '#/components/schemas/DeviceProfile'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: '无效的二维码ID'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: '服务器内部错误'

  /api/devices/{qrcodeId}/lifecycle:
    get:
      tags: [devices, lifecycle]
      summary: 获取设备生命周期事件
      description: |
        根据二维码ID获取设备的完整生命周期事件历史，
        按时间倒序排列，包含所有重要的设备状态变更事件。
      parameters:
        - name: qrcodeId
          in: path
          description: 设备二维码ID
          required: true
          schema:
            type: string
            example: 'test_device_001'
      responses:
        '200':
          description: 成功获取生命周期事件
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LifecycleEvent'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: '无效的二维码ID'
        '404':
          description: 设备未找到
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: '设备档案不存在'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: '服务器内部错误'

  # ==================== 原有API接口 ====================

  /internal/devices:
    get:
      tags: [internal, devices]
      summary: 获取设备列表
      description: |
        从lionfix数据库获取设备信息列表，支持分页和搜索功能。
        仅供FixCycle前端内部调用，需服务端认证。
      security:
        - InternalAuth: []
      parameters:
        - name: page
          in: query
          description: 页码（从1开始）
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: 搜索关键词（设备名称、型号等）
          required: false
          schema:
            type: string
        - name: brand
          in: query
          description: 品牌筛选
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: 分类筛选
          required: false
          schema:
            type: string
        - name: status
          in: query
          description: 设备状态筛选
          required: false
          schema:
            type: string
            enum: [active, inactive, discontinued]
      responses:
        '200':
          description: 成功获取设备列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  summary: 成功响应示例
                  value:
                    code: 200
                    data:
                      items:
                        - id: '1'
                          name: 'iPhone 15 Pro'
                          model: 'A2842'
                          brand: 'Apple'
                          category: '智能手机'
                          release_date: '2023-09-22'
                          status: 'active'
                          image_url: 'https://example.com/iphone15pro.jpg'
                          specifications:
                            screen_size: '6.1英寸'
                            storage: '128GB'
                            ram: '6GB'
                        - id: '2'
                          name: 'Samsung Galaxy S24'
                          model: 'SM-S9210'
                          brand: 'Samsung'
                          category: '智能手机'
                          release_date: '2024-01-17'
                          status: 'active'
                          image_url: 'https://example.com/s24.jpg'
                          specifications:
                            screen_size: '6.2英寸'
                            storage: '256GB'
                            ram: '8GB'
                      pagination:
                        page: 1
                        limit: 20
                        total: 156
                        total_pages: 8
                    message: 'success'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/parts/search:
    get:
      tags: [internal, parts]
      summary: 配件搜索
      description: |
        根据关键词和筛选条件搜索配件信息。
        直接查询lionfix数据库获取最新配件数据。
        仅供FixCycle前端内部调用。
      security:
        - InternalAuth: []
      parameters:
        - name: keyword
          in: query
          description: 搜索关键词（配件名称、型号等）
          required: true
          schema:
            type: string
            minLength: 1
        - name: device_id
          in: query
          description: 关联设备ID筛选
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: 配件分类筛选
          required: false
          schema:
            type: string
        - name: brand
          in: query
          description: 品牌筛选
          required: false
          schema:
            type: string
        - name: min_price
          in: query
          description: 最低价格筛选
          required: false
          schema:
            type: number
            format: float
        - name: max_price
          in: query
          description: 最高价格筛选
          required: false
          schema:
            type: number
            format: float
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  summary: 搜索结果示例
                  value:
                    code: 200
                    data:
                      items:
