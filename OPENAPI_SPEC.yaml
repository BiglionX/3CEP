  /agents/invoke:
    post:
      tags: [internal]
      summary: 统一智能体调用接口
      description: |
        通用智能体调用接口，支持调用各种类型的智能体（n8n工作流、服务型智能体等）。
        通过agent_name参数指定要调用的具体智能体。
      security:
        - InternalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentInvokeRequest'
            examples:
              diagnosis_agent:
                summary: 调用AI故障诊断智能体
                value:
                  idempotency_key: 'diag_20260220_001'
                  trace_id: 'trace_123456789'
                  timeout: 30
                  agent_name: 'AI故障诊断服务'
                  payload:
                    device_id: 'DEV001'
                    symptoms: '设备无法开机'
                    conversation_history: []
              recommendation_agent:
                summary: 调用推荐引擎智能体
                value:
                  idempotency_key: 'rec_20260220_001'
                  trace_id: 'trace_987654321'
                  timeout: 15
                  agent_name: 'FCX智能推荐引擎'
                  payload:
                    user_id: 'user_123'
                    context:
                      location: { 'lat': 39.9042, 'lng': 116.4074 }
                      device_type: 'smartphone'
      responses:
        '200':
          description: 智能体调用成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentInvokeResponse'
              examples:
                success:
                  summary: 调用成功响应示例
                  value:
                    code: 200
                    data:
                      status: 'completed'
                      result:
                        diagnosis: '设备电池电量耗尽'
                        suggested_solutions:
                          - '请给设备充电30分钟后再试'
                          - '如仍无法开机，建议联系专业维修'
                        confidence: 0.92
                        estimated_time: '15-30分钟'
                      metrics:
                        execution_time_ms: 1250
                        tokens_consumed: 850
                        model_used: 'deepseek-chat'
                    message: 'success'
                processing:
                  summary: 异步处理中响应示例
                  value:
                    code: 202
                    data:
                      status: 'processing'
                      result: null
                      metrics:
                        queue_position: 3
                        estimated_wait_time: 15
                    message: '请求已接收，正在处理中'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_agent:
                  value:
                    code: 400
                    data:
                      field: 'agent_name'
                      error: '指定的智能体不存在或不可用'
                    message: '请求参数错误'
        '408':
          description: 请求超时
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    code: 408
                    data:
                      timeout_seconds: 30
                      agent_name: 'AI故障诊断服务'
                    message: '智能体调用超时'
        '429':
          description: 请求过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rate_limit:
                  value:
                    code: 429
                    data:
                      retry_after: 60
                      requests_per_minute: 10
                    message: '请求频率超出限制，请稍后再试'
        '500':
          description: 智能体内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal_error:
                  value:
                    code: 500
                    data:
                      agent_name: 'AI故障诊断服务'
                      error_details: '模型推理服务暂时不可用'
                    message: '智能体执行失败'

  /diagnosis/chat:
    post:
      tags: [diagnosis]
      summary: AI故障诊断对话
      description: |
        与AI诊断系统进行故障诊断对话。
        支持多轮对话和上下文保持。
      security:
        - InternalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - sessionId
              properties:
                message:
                  type: string
                  description: 用户输入的问题
                  example: '我的iPhone无法开机怎么办？'
                sessionId:
                  type: string
                  description: 会话ID，用于保持对话上下文
                  example: 'sess_123456789'
                deviceId:
                  type: string
                  description: 设备ID（可选）
                  example: 'DEV001'
      responses:
        '200':
          description: 成功获取诊断结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  summary: 诊断结果示例
                  value:
                    code: 200
                    data:
                      response: '根据您的描述，iPhone无法开机可能是以下原因：1. 电池电量耗尽，请充电30分钟后再试；2. 系统卡死，可以尝试强制重启...'
                      suggestions:
                        - '先给设备充电30分钟'
                        - '尝试强制重启操作'
                        - '如果问题持续，建议联系专业维修'
                      confidence: 0.85
                      estimated_time: '15-30分钟'
                      sessionId: 'sess_123456789'
                    message: 'success'

# ==================== 组件定义 ====================

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 公开API访问密钥

    InternalAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 内部API认证Token

    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 管理后台认证Token

  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - data
        - message
      properties:
        code:
          type: integer
          description: 响应状态码
          example: 200
        data:
          type: object
          description: 响应数据
          nullable: true
        message:
          type: string
          description: 响应消息
          example: 'success'

    ErrorResponse:
      type: object
      required:
        - code
        - data
        - message
      properties:
        code:
          type: integer
          description: 错误状态码
          example: 400
        data:
          type: object
          description: 错误详情
          nullable: true
        message:
          type: string
          description: 错误消息
          example: '请求参数错误'

    # ==================== 设备生命周期数据模型 ====================

    DeviceProfile:
      type: object
      description: 设备档案信息
      required:
        - id
        - qrcodeId
        - productModel
        - productCategory
        - brandName
        - currentStatus
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: 档案ID
          example: 'profile_12345'
        qrcodeId:
          type: string
          description: 设备二维码ID
          example: 'test_device_001'
        productModel:
          type: string
          description: 产品型号
          example: 'iPhone 15 Pro'
        productCategory:
          type: string
          description: 产品类别
          example: '智能手机'
        brandName:
          type: string
          description: 品牌名称
          example: 'Apple'
        serialNumber:
          type: string
          description: 序列号
          example: 'SN_IP15P_001'
        manufacturingDate:
          type: string
          format: date
          description: 生产日期
          example: '2026-01-15'
        firstActivatedAt:
          type: string
          format: date-time
          description: 首次激活时间
          example: '2026-02-05T10:30:00Z'
        warrantyStartDate:
          type: string
          format: date
          description: 保修开始日期
          example: '2026-02-05'
        warrantyExpiry:
          type: string
          format: date
          description: 保修到期日期
          example: '2027-02-05'
        warrantyPeriod:
          type: integer
          description: 保修期（月）
          example: 12
        currentStatus:
          type: string
          description: 当前状态
          enum:
            [
              manufactured,
              activated,
              in_use,
              maintained,
              transferred,
              recycled,
              scrapped,
            ]
          example: 'activated'
        lastEventAt:
          type: string
          format: date-time
          description: 最后事件时间
          example: '2026-02-19T14:20:00Z'
        lastEventType:
          type: string
          description: 最后事件类型
          example: 'maintained'
        totalRepairCount:
          type: integer
          description: 总维修次数
          example: 1
        totalPartReplacementCount:
          type: integer
          description: 总配件更换次数
          example: 1
        totalTransferCount:
          type: integer
          description: 总转移次数
          example: 0
        currentLocation:
          type: string
          description: 当前位置
          example: '北京市朝阳区'
        ownerInfo:
          type: object
          description: 所有者信息
          properties:
            name:
              type: string
              example: '张三'
            department:
              type: string
              example: 'IT部门'
        specifications:
          type: object
          description: 技术规格
          example: { 'storage': '256GB', 'color': '钛金属原色' }
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: '2026-02-05T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: '2026-02-19T14:20:00Z'

    LifecycleEvent:
      type: object
      description: 生命周期事件
      required:
        - id
        - eventType
        - eventTimestamp
        - location
      properties:
        id:
          type: string
          description: 事件ID
          example: 'event_12345'
        eventType:
          type: string
          description: 事件类型
          enum:
            [
              manufactured,
              activated,
              in_use,
              maintained,
              transferred,
              recycled,
              scrapped,
            ]
          example: 'maintained'
        eventDescription:
          type: string
          description: 事件描述
          example: '设备完成首次维修保养'
        eventTimestamp:
          type: string
          format: date-time
          description: 事件发生时间
          example: '2026-02-19T14:20:00Z'
        location:
          type: string
          description: 事件发生地点
          example: '北京维修中心'
        operator:
          type: string
          description: 操作人员
          example: '维修技师王师傅'
        notes:
          type: string
          description: 备注信息
          example: '更换电池组件，设备运行正常'
        metadata:
          type: object
          description: 附加元数据
          example: { 'repair_score': 85, 'parts_replaced': ['battery'] }

    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: 当前页码
        limit:
          type: integer
          description: 每页数量
        total:
          type: integer
          description: 总记录数
        total_pages:
          type: integer
          description: 总页数

    AgentInvokeRequest:
      type: object
      required:
        - idempotency_key
        - trace_id
        - timeout
        - agent_name
        - payload
      properties:
        idempotency_key:
          type: string
          description: 幂等性键，用于防止重复请求
          example: 'req_20260220_12345'
          maxLength: 128
        trace_id:
          type: string
          description: 调用链追踪ID，用于日志追踪
          example: 'trace_a1b2c3d4e5f6'
          maxLength: 64
        timeout:
          type: integer
          description: 超时时间（秒）
          example: 30
          minimum: 1
          maximum: 300
        agent_name:
          type: string
          description: 要调用的智能体名称
          example: 'AI故障诊断服务'
          maxLength: 100
        payload:
          type: object
          description: 传递给智能体的具体参数
          example:
            device_id: 'DEV001'
            symptoms: '设备无法开机'
            user_id: 'user_123'

    AgentInvokeResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: 调用状态
          enum: [completed, processing, failed, timeout]
          example: 'completed'
        result:
          type: object
          description: 智能体执行结果
          nullable: true
          example:
            diagnosis: '设备电池电量耗尽'
            confidence: 0.92
            suggested_actions:
              - '请充电30分钟后再试'
        error:
          type: object
          description: 错误信息（仅在失败时返回）
          nullable: true
          properties:
            code:
              type: string
              description: 错误代码
              example: 'AGENT_UNAVAILABLE'
            message:
              type: string
              description: 错误描述
              example: '智能体暂时不可用'
            details:
              type: object
              description: 详细错误信息
              nullable: true
        metrics:
          type: object
          description: 执行指标
          properties:
            execution_time_ms:
              type: integer
              description: 执行时间（毫秒）
              example: 1250
            tokens_consumed:
              type: integer
              description: 消耗的token数量
              example: 850
            model_used:
              type: string
              description: 使用的模型名称
              example: 'deepseek-chat'
            queue_position:
              type: integer
              description: 队列中的位置（异步处理时）
              example: 3
            estimated_wait_time:
              type: integer
              description: 预估等待时间（秒）
              example: 15

# ==================== 外部文档 ====================

externalDocs:
  description: 更多技术文档请参考
  url: https://docs.fixcycle.com
