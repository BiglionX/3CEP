# Prometheus告警规则配置
# 采购智能体模块监控告警规则

groups:
  - name: procurement-intelligence.rules
    rules:
      # API性能告警
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(procurement_intelligence_api_response_time_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: 'API响应时间过高'
          description: '采购智能体API P95响应时间超过2秒，当前值为 {{ $value }}秒'

      - alert: VeryHighAPIResponseTime
        expr: histogram_quantile(0.95, rate(procurement_intelligence_api_response_time_seconds_bucket[5m])) > 5
        for: 1m
        labels:
          severity: critical
          service: procurement-intelligence
        annotations:
          summary: 'API响应时间严重过高'
          description: '采购智能体API P95响应时间超过5秒，当前值为 {{ $value }}秒'

      # API错误率告警
      - alert: HighAPIErrorRate
        expr: sum(rate(procurement_intelligence_api_errors_total[5m])) / sum(rate(procurement_intelligence_api_requests_total[5m])) * 100 > 5
        for: 2m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: 'API错误率过高'
          description: '采购智能体API错误率超过5%，当前值为 {{ $value }}%'

      - alert: CriticalAPIErrorRate
        expr: sum(rate(procurement_intelligence_api_errors_total[5m])) / sum(rate(procurement_intelligence_api_requests_total[5m])) * 100 > 15
        for: 1m
        labels:
          severity: critical
          service: procurement-intelligence
        annotations:
          summary: 'API错误率严重过高'
          description: '采购智能体API错误率超过15%，当前值为 {{ $value }}%'

      # 请求量异常告警
      - alert: UnusualTrafficPattern
        expr: abs(rate(procurement_intelligence_api_requests_total[5m]) - rate(procurement_intelligence_api_requests_total[10m] offset 5m)) / rate(procurement_intelligence_api_requests_total[10m] offset 5m) > 0.5
        for: 3m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: '流量模式异常'
          description: '采购智能体API请求量出现异常波动，变化幅度超过50%'

  - name: system-health.rules
    rules:
      # 系统资源告警
      - alert: HighMemoryUsage
        expr: avg(nodejs_heap_used_bytes) / avg(nodejs_heap_limit_bytes) * 100 > 85
        for: 3m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: '内存使用率过高'
          description: 'Node.js应用内存使用率超过85%，当前值为 {{ $value }}%'

      - alert: CriticalMemoryUsage
        expr: avg(nodejs_heap_used_bytes) / avg(nodejs_heap_limit_bytes) * 100 > 95
        for: 1m
        labels:
          severity: critical
          service: procurement-intelligence
        annotations:
          summary: '内存使用率严重过高'
          description: 'Node.js应用内存使用率超过95%，当前值为 {{ $value }}%'

      - alert: HighCPUUsage
        expr: avg(nodejs_cpu_usage_percentage) > 80
        for: 3m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: 'CPU使用率过高'
          description: 'Node.js应用CPU使用率超过80%，当前值为 {{ $value }}%'

      # Redis监控告警
      - alert: RedisConnectionIssues
        expr: redis_connected_clients < 1
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: 'Redis连接异常'
          description: 'Redis客户端连接数异常，可能存在连接问题'

      - alert: RedisMemoryPressure
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 2m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: 'Redis内存压力大'
          description: 'Redis内存使用率超过90%，当前值为 {{ $value }}%'

  - name: business-metrics.rules
    rules:
      # 业务指标告警
      - alert: LowSupplierMatchRate
        expr: sum(rate(procurement_intelligence_supplier_matches_success_total[10m])) / sum(rate(procurement_intelligence_supplier_matches_total[10m])) * 100 < 70
        for: 5m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: '供应商匹配成功率低'
          description: '供应商匹配成功率低于70%，当前值为 {{ $value }}%'

      - alert: PriceOptimizationDegradation
        expr: sum(rate(procurement_intelligence_price_optimizations_improved_total[10m])) / sum(rate(procurement_intelligence_price_optimizations_total[10m])) * 100 < 60
        for: 5m
        labels:
          severity: warning
          service: procurement-intelligence
        annotations:
          summary: '价格优化效果下降'
          description: '价格优化改善率低于60%，当前值为 {{ $value }}%'
