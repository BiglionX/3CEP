# n8n自动化工作流平台部署配置
version: '3.8'

services:
  # PostgreSQL数据库 - 存储n8n工作流、执行历史等数据
  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    networks:
      - n8n-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U n8n" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis服务 - 用于队列模式和缓存(可选)
  n8n-redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - n8n-redis-data:/data
    networks:
      - n8n-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n主服务
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:${N8N_PORT:-5678}"
    environment:
      # 基础配置
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_HOST=${N8N_HOST:-localhost}

      # 加密配置
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # 数据库配置
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

      # Redis配置(可选)
      - QUEUE_BULL_REDIS_HOST=n8n-redis
      - QUEUE_BULL_REDIS_PORT=6379

      # 执行配置
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=336

      # 安全配置
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # 日志配置
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console

      # 其他配置
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Shanghai}

      # iframe 嵌入配置
      - N8N_DISABLE_UI_ACCESS=${N8N_DISABLE_UI_ACCESS:-false}
      - N8N_SESSION_COOKIE_SAMESITE=${N8N_SESSION_COOKIE_SAMESITE:-none}
      - N8N_SESSION_COOKIE_SECURE=${N8N_SESSION_COOKIE_SECURE:-true}
      - N8N_CORS_ALLOWED_ORIGINS=${N8N_CORS_ALLOWED_ORIGINS}

    volumes:
      - n8n-storage:/home/node/.n8n
      - ./n8n/custom:/home/node/.n8n/custom # 自定义节点目录
      - ./n8n/logs:/home/node/.n8n/logs # 日志目录
    networks:
      - n8n-network
    depends_on:
      n8n-postgres:
        condition: service_healthy
      n8n-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${N8N_PORT:-5678}/healthz" ]
      interval: 60s
      timeout: 10s
      retries: 3
  # Nginx反向代理(可选) - 暂时注释掉以避免网络问题
  # n8n-proxy:
  #   image: nginx:alpine
  #   container_name: n8n-nginx-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./n8n/nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./n8n/nginx/conf.d:/etc/nginx/conf.d
  #     - ./n8n/ssl:/etc/nginx/ssl
  #   networks:
  #     - n8n-network
  #   depends_on:
  #     - n8n
  #   # environment:
  #     # - VIRTUAL_HOST=${N8N_DOMAIN}
  #     # - LETSENCRYPT_HOST=${N8N_DOMAIN}
  #     # - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n-postgres-data:
    driver: local
  n8n-redis-data:
    driver: local
  n8n-storage:
    driver: local
