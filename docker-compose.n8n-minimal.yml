# n8n最小化部署配置 (仅核心服务)
version: '3.8'

services:
  # PostgreSQL数据库
  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    networks:
      - n8n-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n']
      interval: 30s
      timeout: 10s
      retries: 3

  # n8n主服务 (不依赖Redis)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - '${N8N_PORT:-5678}:${N8N_PORT:-5678}'
    environment:
      # 基础配置
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_HOST=${N8N_HOST:-localhost}

      # 加密配置
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # 数据库配置
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

      # 执行配置
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=336

      # 安全配置
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # 日志配置
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console

      # 其他配置
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Shanghai}

    volumes:
      - n8n-storage:/home/node/.n8n
      - ./n8n/custom:/home/node/.n8n/custom
      - ./n8n/logs:/home/node/.n8n/logs
    networks:
      - n8n-network
    depends_on:
      n8n-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:${N8N_PORT:-5678}/healthz',
        ]
      interval: 60s
      timeout: 10s
      retries: 3

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n-postgres-data:
    driver: local
  n8n-storage:
    driver: local
