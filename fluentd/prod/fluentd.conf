# Fluentd配置文件 - 生产环境

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type tail
  path /var/log/app/application.log
  pos_file /var/log/td-agent/app.log.pos
  tag app.access
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

<source>
  @type tail
  path /var/log/app/error.log
  pos_file /var/log/td-agent/error.log.pos
  tag app.error
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%NZ
</source>

<source>
  @type tail
  path /var/log/nginx/access.log
  pos_file /var/log/td-agent/nginx.access.log.pos
  tag nginx.access
  format /^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)"(?:\s+(?<http_x_forwarded_for>[^ ]+))?)?$/
  time_format %d/%b/%Y:%H:%M:%S %z
</source>

<source>
  @type tail
  path /var/log/nginx/error.log
  pos_file /var/log/td-agent/nginx.error.log.pos
  tag nginx.error
  format /^(?<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level>[^\]]+)\] (?<pid>\d+)#(?<tid>\d+): (?<message>.*)$/
  time_format %Y/%m/%d %H:%M:%S
</source>

# 过滤器 - 添加元数据
<filter app.**>
  @type record_transformer
  <record>
    hostname "#{Socket.gethostname}"
    service_name "fixcycle-app"
    environment "production"
    version "#{ENV['APP_VERSION'] || 'unknown'}"
  </record>
</filter>

<filter nginx.**>
  @type record_transformer
  <record>
    hostname "#{Socket.gethostname}"
    service_name "nginx"
    environment "production"
  </record>
</filter>

# 处理慢查询日志
<match app.slow_query>
  @type detect_exceptions
  remove_tag_prefix app
  message log
  multiline_flush_interval 5s
</match>

# 处理错误日志
<match app.error>
  @type detect_exceptions
  remove_tag_prefix app
  message log
  multiline_flush_interval 5s
</match>

# 路由到不同目的地

# 应用访问日志 -> Elasticsearch
<match app.access>
  @type elasticsearch
  host elasticsearch-prod
  port 9200
  logstash_format true
  logstash_prefix app-access
  include_tag_key true
  tag_key @log_name
  flush_interval 10s
</match>

# 应用错误日志 -> Elasticsearch + Slack告警
<match app.error>
  @type copy
  
  <store>
    @type elasticsearch
    host elasticsearch-prod
    port 9200
    logstash_format true
    logstash_prefix app-errors
    include_tag_key true
    tag_key @log_name
    flush_interval 5s
  </store>
  
  <store>
    @type slack
    webhook_url "#{ENV['SLACK_WEBHOOK_URL']}"
    channel "#alerts"
    username "LogBot"
    icon_emoji ":rotating_light:"
    flush_interval 1s
    
    <format>
      @type single_value
      message_key message
    </format>
  </store>
</match>

# Nginx访问日志 -> Elasticsearch
<match nginx.access>
  @type elasticsearch
  host elasticsearch-prod
  port 9200
  logstash_format true
  logstash_prefix nginx-access
  include_tag_key true
  tag_key @log_name
  flush_interval 15s
</match>

# Nginx错误日志 -> Elasticsearch
<match nginx.error>
  @type elasticsearch
  host elasticsearch-prod
  port 9200
  logstash_format true
  logstash_prefix nginx-errors
  include_tag_key true
  tag_key @log_name
  flush_interval 10s
</match>

# 系统指标 -> Prometheus
<match system.metrics>
  @type prometheus
  <metric>
    name app_response_time_seconds
    type histogram
    desc "Application response time"
    key response_time
    buckets 0.1, 0.5, 1.0, 2.0, 5.0
  </metric>
  
  <metric>
    name app_requests_total
    type counter
    desc "Total number of requests"
    key request_count
  </metric>
  
  <metric>
    name app_errors_total
    type counter
    desc "Total number of errors"
    key error_count
  </metric>
</match>

# 备份到文件系统
<match **>
  @type file
  path /var/log/archived/logs
  append true
  time_slice_format %Y%m%d
  time_slice_wait 10m
  time_format %Y%m%dT%H%M%S%z
  
  <format>
    @type json
  </format>
</match>

# 监控Fluentd自身
<match fluent.info>
  @type elasticsearch
  host elasticsearch-prod
  port 9200
  logstash_format true
  logstash_prefix fluentd-info
</match>

<match fluent.warn>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch-prod
    port 9200
    logstash_format true
    logstash_prefix fluentd-warn
  </store>
  <store>
    @type slack
    webhook_url "#{ENV['SLACK_WEBHOOK_URL']}"
    channel "#alerts"
  </store>
</match>