name: Phase5 Integration Tests

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点运行

jobs:
  phase5-integration-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 5 Integration Tests
        run: |
          echo "🚀 Running Phase 5 Integration Tests..."
          node tests/integration/phase5-integration-tests.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: phase5-test-reports-${{ matrix.node-version }}
          path: |
            reports/phase5-integration-test-report.json
            reports/phase5-integration-test-report.html
            reports/phase5-integration-test-report.md

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Phase 5 Integration Tests failed on Node.js ${{ matrix.node-version }}"
