name: FixCycle CI 测试流水线

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        database: [postgresql]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fixcycle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fixcycle_test
      NEXT_PUBLIC_API_URL: http://localhost:3000
      COVERAGE_THRESHOLD: 80
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Database migration
        run: |
          npm run db:migrate
          npm run seed:data

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: jest-junit.xml

      - name: Run integration tests
        run: npm run test:integration

      - name: Start application for E2E tests
        run: |
          npm run build
          npm start &
          sleep 10
          echo "Application started"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml

      - name: Start agents test server
        run: |
          # 启动测试服务器以支持agents测试
          node deploy-simple/server.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 10  # 等待服务器启动
          echo "Agents test server started"

      - name: Run agents integration tests
        run: |
          export AGENTS_HOST=localhost
          export AGENTS_PORT=3001
          export AGENTS_API_KEY=test-agents-api-key
          npm run test:agents
        env:
          CI: true

      - name: Stop agents test server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
            echo "Agents test server stopped"
          fi

      - name: Run n8n workflow tests
        run: npm run test:n8n
        continue-on-error: true

      - name: Run performance tests
        run: npm run test:perf
        continue-on-error: true

      - name: Run security checks
        run: npm run test:security
        continue-on-error: true

      - name: Generate consolidated report
        run: node tests/generate-consolidated-report.js

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}-${{ matrix.database }}
          path: |
            test-results/
            coverage/
            playwright-report/

      - name: Check quality gates
        run: |
          # 检查覆盖率
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "❌ Coverage below threshold ($COVERAGE_THRESHOLD%)"
              exit 1
            fi
          fi

          # 检查测试通过率
          if [ -f "test-results/jest-junit.xml" ]; then
            PASSED=$(grep -c 'failure.*message' test-results/jest-junit.xml || echo "0")
            TOTAL=$(grep -c 'testcase' test-results/jest-junit.xml)
            if [ $TOTAL -gt 0 ]; then
              PASS_RATE=$(echo "scale=2; ($TOTAL - $PASSED) * 100 / $TOTAL" | bc)
              echo "Pass rate: $PASS_RATE%"
              if (( $(echo "$PASS_RATE < 85" | bc -l) )); then
                echo "❌ Pass rate below threshold (85%)"
                exit 1
              fi
            fi
          fi

  quality-gate:
    needs: test-suite
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Analyze test results
        run: |
          echo "🔍 分析测试结果..."
          # 这里可以添加更复杂的质量门禁逻辑
          echo "✅ 质量门禁检查完成"

  deploy-preview:
    needs: [test-suite, quality-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.test-suite.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to preview environment
        run: |
          echo "🚀 部署到预览环境..."
          # 添加实际的部署逻辑

  notification:
    needs: [test-suite, quality-gate]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Slack notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#ci-notifications'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
