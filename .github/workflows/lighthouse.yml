name: Lighthouse Performance Test

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每天 UTC 时间凌晨 2 点运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Start Server
        run: |
          npm start &
          sleep 15
          echo "Server started"
        shell: bash

      - name: Run Lighthouse Tests
        run: node scripts/run-lighthouse.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: reports/lighthouse/
          retention-days: 30

      - name: Upload Summary JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-summary
          path: reports/lighthouse/latest-summary.json
          retention-days: 90

      - name: Comment PR with Results (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              const summaryPath = path.join(process.env.GITHUB_WORKSPACE, 'reports/lighthouse/latest-summary.json');
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));

              let comment = '## 🚀 Lighthouse 性能测试结果\n\n';
              comment += '| 指标 | 平均分 | 要求 | 状态 |\n';
              comment += '|------|--------|------|------|\n';

              const thresholds = {
                performance: 90,
                accessibility: 90,
                'best-practices': 90,
                seo: 90
              };

              Object.entries(thresholds).forEach(([key, threshold]) => {
                const score = summary.averageScores[key];
                const passed = score >= threshold;
                const icon = passed ? '✅' : '❌';
                comment += `| ${key} | ${score} | ≥${threshold} | ${icon} |\n`;
              });

              comment += '\n📊 详细报告请查看构建产物中的 HTML 报告。\n';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.error('Failed to create PR comment:', error);
            }
