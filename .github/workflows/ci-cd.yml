name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run type checking
      run: npm run type-check
    
    - name: Run unit tests
      run: npm run test
    
    - name: Run boundary tests
      run: npm run test:boundary
    
    - name: Run Playwright tests
      run: |
        npx playwright install chromium
        npm run test:e2e

  n8n-validation:
    runs-on: ubuntu-latest
    needs: test
    
    services:
      n8n:
        image: n8nio/n8n:latest
        ports:
          - 5678:5678
        env:
          N8N_ENCRYPTION_KEY: test-key-for-ci-${{ github.sha }}
          DB_TYPE: sqlite
          N8N_LOG_LEVEL: error
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Wait for n8n to start
      run: |
        timeout 120 bash -c 'until curl -s http://localhost:5678/healthz; do sleep 5; done'
        echo "n8n service is ready"
    
    - name: Validate workflow JSON files
      run: |
        find n8n-workflows -name "*.json" -not -path "*/node_modules/*" -exec node -e '
          const fs = require("fs");
          const file = "{}";
          try {
            const content = fs.readFileSync(file, "utf8");
            JSON.parse(content);
            console.log("✓ Valid JSON:", file);
          } catch (e) {
            console.error("✗ Invalid JSON:", file, e.message);
            process.exit(1);
          }
        ' \; || exit 1
    
    - name: Check version consistency
      run: |
        node -e '
          const fs = require("fs");
          const path = require("path");
          
          // 检查版本注册表
          const registry = JSON.parse(fs.readFileSync("n8n-workflows/VERSION_REGISTRY.json", "utf8"));
          
          // 验证每个工作流的版本信息
          Object.keys(registry).forEach(domain => {
            const domainInfo = registry[domain];
            console.log(`Checking domain: ${domain}, current version: ${domainInfo.current}`);
          });
          
          console.log("✓ Version consistency check passed");
        '
    
    - name: Import test workflows
      run: |
        cd n8n-workflows
        # 导入采购相关工作流进行测试
        for workflow in procurement/v1.0.0/*.json; do
          if [ -f "$workflow" ]; then
            echo "Importing $workflow"
            curl -s -X POST http://localhost:5678/workflows \
              -H "Content-Type: application/json" \
              -d "@${workflow}" > /dev/null
          fi
        done
    
    - name: Run n8n workflow tests
      run: |
        cd n8n-workflows
        export N8N_BASE_URL="http://localhost:5678"
        node test-n8n-workflows.js --health
        node test-n8n-workflows.js --activation
    
    - name: Generate n8n test report
      run: |
        mkdir -p test-results/n8n-workflow-tests
        cd n8n-workflows
        export N8N_BASE_URL="http://localhost:5678"
        node test-n8n-workflows.js > ../test-results/n8n-workflow-tests/latest-report.txt || true
    
    - name: Upload n8n test results
      uses: actions/upload-artifact@v4
      with:
        name: n8n-test-results
        path: |
          test-results/n8n-workflow-tests/
          n8n-workflows/**/*.json
        retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: .next/

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel Preview
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prebuilt'

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel Production
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prebuilt --prod'