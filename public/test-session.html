<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试 Session API</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
      }
      .result {
        background: #f5f5f5;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
        white-space: pre-wrap;
      }
      button {
        background: #0070f3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }
      button:hover {
        background: #0051cc;
      }
      input {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>🔍 测试 /api/session/me 接口</h1>

    <div>
      <h3>步骤 1: 设置 Token</h3>
      <input type="text" id="tokenInput" placeholder="输入 Bearer Token" />
      <button onclick="setToken()">设置 Token 到 localStorage</button>
      <button onclick="clearToken()">清除 Token</button>
    </div>

    <div>
      <h3>步骤 2: 测试 API</h3>
      <button onclick="testWithoutAuth()">无认证访问</button>
      <button onclick="testWithAuth()">带认证访问 (从 localStorage)</button>
      <button onclick="testWithCustomToken()">带自定义 Token</button>
    </div>

    <div>
      <h3>测试结果</h3>
      <div id="result" class="result">等待测试...</div>
    </div>

    <script>
      function setToken() {
        const token = document.getElementById('tokenInput').value;
        if (!token) {
          alert('请输入 token');
          return;
        }
        localStorage.setItem('mock-token', token);
        alert('Token 已设置：' + token);
        console.log('Token:', token);
      }

      function clearToken() {
        localStorage.removeItem('mock-token');
        alert('Token 已清除');
      }

      async function testWithoutAuth() {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = '正在请求...';

        try {
          const response = await fetch('/api/session/me');
          const data = await response.json();

          resultDiv.textContent = `状态码：${response.status}\n响应数据:\n${JSON.stringify(data, null, 2)}`;
        } catch (error) {
          resultDiv.textContent = `错误：${error.message}`;
        }
      }

      async function testWithAuth() {
        const resultDiv = document.getElementById('result');
        const token = localStorage.getItem('mock-token');

        if (!token) {
          alert('请先设置 Token');
          return;
        }

        resultDiv.textContent = `正在请求...\n使用 Token: ${token.substring(0, 30)}...`;

        try {
          const response = await fetch('/api/session/me', {
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
          });
          const data = await response.json();

          resultDiv.textContent = `状态码：${response.status}\n响应数据:\n${JSON.stringify(data, null, 2)}`;
        } catch (error) {
          resultDiv.textContent = `错误：${error.message}`;
        }
      }

      async function testWithCustomToken() {
        const resultDiv = document.getElementById('result');
        const token = document.getElementById('tokenInput').value;

        if (!token) {
          alert('请输入 Token');
          return;
        }

        resultDiv.textContent = `正在请求...\n使用 Token: ${token.substring(0, 30)}...`;

        try {
          const response = await fetch('/api/session/me', {
            headers: {
              Authorization: `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
          });
          const data = await response.json();

          resultDiv.textContent = `状态码：${response.status}\n响应数据:\n${JSON.stringify(data, null, 2)}`;
        } catch (error) {
          resultDiv.textContent = `错误：${error.message}`;
        }
      }

      // 页面加载时检查是否有 token
      window.onload = () => {
        const token = localStorage.getItem('mock-token');
        if (token) {
          document.getElementById('tokenInput').value = token;
          console.log('发现已保存的 Token:', token);
        }
      };
    </script>
  </body>
</html>
