<!doctype html>
<html>
  <head>
    <title>登录功能测试页面</title>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #555;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }
      .status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
      .hidden {
        display: none;
      }
      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔐 管理后台登录测试</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">邮箱地址</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            value="1055603323@qq.com"
            placeholder="请输入邮箱地址"
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            value="12345678"
            placeholder="请输入密码"
          />
        </div>

        <button type="submit" id="loginButton">
          <span id="buttonText">登录管理后台</span>
        </button>
      </form>

      <div id="status" class="status hidden"></div>

      <div style="margin-top: 30px; text-align: center">
        <button
          onclick="testDirectAccess()"
          style="
            background: #6c757d;
            width: auto;
            padding: 10px 20px;
            margin: 5px;
          "
        >
          直接访问管理后台
        </button>
        <button
          onclick="clearStatus()"
          style="
            background: #ffc107;
            color: #212529;
            width: auto;
            padding: 10px 20px;
            margin: 5px;
          "
        >
          清除状态
        </button>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const loginButton = document.getElementById('loginButton');
      const buttonText = document.getElementById('buttonText');
      const statusDiv = document.getElementById('status');

      // 显示状态消息
      function showStatus(message, type = 'info') {
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
        statusDiv.classList.remove('hidden');
      }

      // 隐藏状态
      function hideStatus() {
        statusDiv.classList.add('hidden');
      }

      // 设置按钮加载状态
      function setButtonLoading(loading) {
        if (loading) {
          buttonText.innerHTML = '<span class="loading"></span>登录中...';
          loginButton.disabled = true;
        } else {
          buttonText.textContent = '登录管理后台';
          loginButton.disabled = false;
        }
      }

      // 表单提交处理
      form.addEventListener('submit', async e => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        showStatus('正在验证登录信息...', 'info');
        setButtonLoading(true);

        try {
          // 发送登录请求
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          });

          const result = await response.json();

          if (response.ok && result.success) {
            showStatus('✅ 登录成功！正在跳转到管理后台...', 'success');

            // 延迟跳转让用户看到成功消息
            setTimeout(() => {
              window.location.href = '/admin/dashboard';
            }, 1500);
          } else {
            showStatus(`❌ 登录失败: ${result.error || '未知错误'}`, 'error');
          }
        } catch (error) {
          showStatus(`❌ 网络错误: ${error.message}`, 'error');
        } finally {
          setButtonLoading(false);
        }
      });

      // 直接访问管理后台
      function testDirectAccess() {
        showStatus('正在尝试直接访问管理后台...', 'info');
        window.open('/admin/dashboard', '_blank');
      }

      // 清除状态
      function clearStatus() {
        hideStatus();
      }

      // 页面加载完成提示
      window.addEventListener('load', () => {
        showStatus('✅ 测试环境已就绪，可以开始登录测试', 'success');
        setTimeout(hideStatus, 3000);
      });

      // 错误处理
      window.addEventListener('error', event => {
        if (event.error && event.error.message) {
          showStatus(`🚨 页面错误: ${event.error.message}`, 'error');
        }
      });
    </script>
  </body>
</html>
